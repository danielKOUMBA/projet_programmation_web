<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Réinitialiser Mot de Passe - QuizMaster</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/reset-password.css" />
  </head>
  <body class="page">
    <!-- Navigation principale -->
    <header class="navigation-test">
      <div class="navigation-test-interieur">
        <div class="marque">
          <div class="logo-marque">Q</div>
          <div>
            <div class="texte-marque">QuizMaster</div>
          </div>
        </div>
        <nav class="liens-navigation" aria-label="Navigation principale">
          <a href="index.html" class="lien-navigation">Accueil</a>
          <a href="quiz.html" class="lien-navigation">Jouer</a>
          <a href="classement.html" class="lien-navigation">Classement</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <section class="conteneur conteneur--etroit">
        <div class="carte">
          <div class="carte-en-tete">
            <h1 class="carte-titre">Réinitialiser votre mot de passe</h1>
            <p class="carte-sous-titre">
              Entrez votre nouveau mot de passe ci-dessous.
            </p>
          </div>

          <div id="reset-alert" class="alert" role="alert" aria-live="polite"></div>

          <form id="reset-form" novalidate>
            <div class="groupe-formulaire">
              <label for="password" class="etiquette-formulaire">Nouveau mot de passe</label>
              <input
                id="password"
                name="password"
                type="password"
                class="champ-formulaire"
                placeholder="••••••••"
                autocomplete="new-password"
                required
                minlength="6"
              />
              <p id="reset-password-error" class="erreur-formulaire" role="alert"></p>
            </div>

            <div class="groupe-formulaire">
              <label for="confirmation" class="etiquette-formulaire">Confirmer le mot de passe</label>
              <input
                id="confirmation"
                name="confirmation"
                type="password"
                class="champ-formulaire"
                placeholder="••••••••"
                autocomplete="new-password"
                required
                minlength="6"
              />
              <p id="reset-confirmation-error" class="erreur-formulaire" role="alert"></p>
            </div>

            <button type="submit" class="bouton bouton--primaire bouton--largeur-complete">
              Réinitialiser le mot de passe
            </button>

            <div class="pied-authentification">
              <p><a href="index.html" class="texte-primaire">Retour à la connexion</a></p>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/forms.js"></script>
  </body>
</html>
