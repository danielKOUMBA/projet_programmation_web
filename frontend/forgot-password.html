<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mot de Passe Oublié - QuizMaster</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/forgot-password.css" />
  </head>
  <body class="page">
    <!-- Navigation principale -->
    <header class="navigation-test">
      <div class="navigation-test-interieur">
        <div class="marque">
          <div class="logo-marque">Q</div>
          <div>
            <div class="texte-marque">QuizMaster</div>
          </div>
        </div>
        <nav class="liens-navigation" aria-label="Navigation principale">
          <a href="index.html" class="lien-navigation">Accueil</a>
          <a href="quiz.html" class="lien-navigation">Jouer</a>
          <a href="classement.html" class="lien-navigation">Classement</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <section class="conteneur conteneur--etroit">
        <div class="carte">
          <div class="carte-en-tete">
            <h1 class="carte-titre">Mot de passe oublié</h1>
            <p class="carte-sous-titre">
              Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe.
            </p>
          </div>

          <div id="forgot-alert" class="alert" role="alert" aria-live="polite"></div>

          <form id="forgot-form" novalidate>
            <div class="groupe-formulaire">
              <label for="email" class="etiquette-formulaire">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                class="champ-formulaire"
                placeholder="votre@email.com"
                autocomplete="email"
                required
              />
              <p id="forgot-email-error" class="erreur-formulaire" role="alert"></p>
            </div>

            <button type="submit" class="bouton bouton--primaire bouton--largeur-complete">
              Envoyer le lien de réinitialisation
            </button>

            <div class="pied-authentification">
              <p><a href="index.html" class="texte-primaire">Retour à la connexion</a></p>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/forms.js"></script>
  </body>
</html>
