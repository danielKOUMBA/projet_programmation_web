<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster - Défiez votre esprit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">Q</span> QuizMaster
        </div>
        <ul class="nav-links">
            <li><a href="#">Jouer</a></li>
            <li><a href="#">Classement</a></li>
            <li><a href="#">Connexion</a></li>
            <li><button class="btn-signin" id="openAuth">Sign in</button></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="image-card">
            <img src="https://via.placeholder.com/800x450/12171d/ffffff?text=QuizMaster+Students" alt="Étudiants" class="hero-img">
        </div>

        <div class="hero-content">
            <span class="badge">GRATUIT & ÉDUCATIF</span>
            <h1>Défiez Votre Esprit avec <br> QuizMaster</h1>
            <p>Testez vos connaissances sur plusieurs sujets, affrontez vos amis et montez dans le classement !</p>
        </div>
    </main>

    <div id="authModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Connexion</h3>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Mot de passe" required>
                <button type="submit" class="btn-submit">Se connecter</button>
                <button type="button" id="closeModal" class="btn-cancel">Annuler</button>
            </form>
            <p id="authMessage"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
